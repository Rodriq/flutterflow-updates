name: Deploy Flutter Web to cPanel

on:
  push:
    branches:
      - cpanel

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'  # Replace with your Flutter version

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}  # cPanel FTP server address
          username: ${{ secrets.CPANEL_FTP_USERNAME }}  # cPanel FTP username
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}  # cPanel FTP password
          server-dir: ${{ secrets.CPANEL_FTP_PATH }}  # Remote path on the server
          local-dir: build/web
          dangerous-clean-slate: true
