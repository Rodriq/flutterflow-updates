name: Deploy Flutter Web to cPanel

on:
  push:
    branches: [ cpanel ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.3'
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Enable web
      run: flutter config --enable-web
      
    - name: Build web
      run: flutter build web --release --web-renderer html
      
    - name: List build contents (for debugging)
      run: ls -la build/web/
      
    - name: Install lftp
      run: |
        sudo apt-get update
        sudo apt-get install lftp
        
    - name: Deploy to cPanel
      env:
        FTP_SERVER: ${{ secrets.CPANEL_FTP_HOST }}
        FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        FTP_PATH: ${{ secrets.CPANEL_FTP_PATH }}
      run: |
        cd build/web
        lftp -e "set ssl:verify-certificate no; open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER; mirror -Rve --exclude .git --exclude .github --exclude **/.DS_Store . $FTP_PATH; quit"
        
    - name: Verify deployment
      run: |
        echo "✅ Flutter web app deployed successfully to cPanel!"
        echo "🌐 Check your website to verify the deployment"
